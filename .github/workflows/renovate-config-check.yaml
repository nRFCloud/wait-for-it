name: Validate Renovate Config

on:
  push:
    paths:
      - "renovate.json"
  pull_request:
    paths:
      - "renovate.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate renovate.json
        run: npx --yes --package renovate -- renovate-config-validator
