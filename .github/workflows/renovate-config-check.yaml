name: Validate Renovate Config

on:
  push:
    paths:
      - "renovate.json"
  pull_request:
    paths:
      - "renovate.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate renovate.json
        run: npx --yes --package renovate -- renovate-config-validator
